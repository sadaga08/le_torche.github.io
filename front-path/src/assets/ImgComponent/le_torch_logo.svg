<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <title>Le Torch — logo horizontal</title>
  <desc>Logo horizontal Le Torch avec flamme stylisée bleue et texte</desc>

  <g transform="translate(50, 60)">
    <!-- Socle torche -->
    <rect x="-38" y="42" width="76" height="14" rx="7" fill="#185FA5"/>
    <rect x="-26" y="50" width="52" height="28" rx="4" fill="#185FA5"/>
    <rect x="-7" y="72" width="14" height="18" rx="2" fill="#0C447C"/>

    <!-- Flamme extérieure -->
    <path d="M0 40 C-8 22 -20 2 -12 -16 C-7 -26 0 -34 0 -34 C0 -34 7 -26 12 -16 C20 2 8 22 0 40Z" fill="#378ADD"/>

    <!-- Flamme intérieure -->
    <path d="M0 26 C-5 10 -9 -2 -5 -14 C-2 -20 0 -26 0 -26 C0 -26 2 -20 5 -14 C9 -2 5 10 0 26Z" fill="#B5D4F4"/>

    <!-- Pointe lumineuse -->
    <ellipse cx="0" cy="-16" rx="3" ry="4" fill="white" opacity="0.95"/>

    <!-- Texte principal -->
    <text x="56" y="52" font-family="Arial, sans-serif" font-size="36" font-weight="500" fill="#185FA5" letter-spacing="6">LE TORCH</text>

    <!-- Ligne séparatrice -->
    <line x1="58" y1="64" x2="370" y2="64" stroke="#B5D4F4" stroke-width="0.5"/>

    <!-- Sous-titre -->
    <text x="58" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#378ADD" letter-spacing="3">SAVOIR · PARTAGER · INSPIRER</text>
  </g>
</svg>
